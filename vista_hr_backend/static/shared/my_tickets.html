<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VISTA-HR | My Tickets</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/auth/toast.js"></script>
    <link rel="stylesheet" href="my_tickets.css" />
    <link rel="stylesheet" href="my_tickets_topbar.css" />
</head>

<body>
    <!-- ══ TOPBAR ══ -->
    <header class="vh-topbar">
        <div class="vh-topbar-inner">
            <a class="vh-brand" id="brandLink" href="#">
                <span class="vh-brand-mark"></span>
                <span>VISTA<b>-HR</b></span>
            </a>
            <div class="vh-topbar-right">
                <div class="vh-profile-wrap" id="vhProfileWrap">
                    <button class="vh-user-btn" id="vhProfileBtn" aria-haspopup="true" aria-expanded="false">
                        <span class="vh-avatar" id="vhAvatarEl"></span>
                    </button>
                    <div class="vh-dropdown" id="vhDropdown" aria-hidden="true">
                        <div class="vh-dd-user">
                            <div class="vh-dd-avatar" id="vhDdAvatar"></div>
                            <div class="vh-dd-info">
                                <div class="vh-dd-name" id="vhDdName">User</div>
                                <div class="vh-dd-email" id="vhDdEmail"></div>
                            </div>
                        </div>
                        <div class="vh-dd-sep"></div>
                        <button class="vh-dd-item" id="vhDashLink"><i
                                data-lucide="layout-dashboard"></i>Dashboard</button>
                        <button class="vh-dd-item" id="vhProfileLink"><i data-lucide="user"></i>Profile</button>
                        <div class="vh-dd-sep"></div>
                        <button class="vh-dd-item vh-dd-logout" id="vhLogout"><i data-lucide="log-out"></i>Log
                            out</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="page-header">
            <div>
                <h1 class="page-title">My Tickets</h1>
                <p class="page-sub">Submit and track your concerns</p>
            </div>
            <button class="btn-primary" id="newTicketBtn" type="button">
                <i data-lucide="plus"></i> New ticket
            </button>
        </div>

        <div class="tickets-list" id="ticketsList"></div>

        <div class="empty-state" id="emptyState" hidden>
            <div class="empty-icon"><i data-lucide="ticket"></i></div>
            <h2>No tickets yet</h2>
            <p>Have a concern? Submit a ticket and our team will get back to you.</p>
            <button class="btn-primary" id="emptyNewBtn" type="button">
                <i data-lucide="plus"></i> Submit a ticket
            </button>
        </div>
    </main>

    <!-- New ticket modal -->
    <div class="modal-overlay" id="newTicketOverlay" hidden>
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title">Submit a ticket</h3>
                <button class="modal-close" id="newTicketClose" type="button"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div class="field">
                    <label class="field-label">Category</label>
                    <select id="ticketCategory" class="field-select">
                        <option value="TECHNICAL">Technical issue</option>
                        <option value="BILLING">Billing</option>
                        <option value="LISTING">Listing concern</option>
                        <option value="ACCOUNT">Account issue</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
                <div class="field">
                    <label class="field-label">Subject</label>
                    <input id="ticketSubject" class="field-input" type="text"
                        placeholder="Brief summary of your concern" maxlength="200" />
                </div>
                <div class="field">
                    <label class="field-label">Description</label>
                    <textarea id="ticketBody" class="field-textarea" rows="5"
                        placeholder="Describe your concern in detail..." maxlength="5000"></textarea>
                </div>
                <small class="field-err" id="ticketErr"></small>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="ticketCancelBtn" type="button">Cancel</button>
                <button class="btn-primary" id="ticketSubmitBtn" type="button">
                    <span class="btn-label">Submit</span>
                    <span class="btn-spinner" hidden></span>
                </button>
            </div>
        </div>
    </div>

    <!-- Ticket detail modal -->
    <div class="modal-overlay" id="detailOverlay" hidden>
        <div class="modal-card">
            <div class="modal-header">
                <h3 class="modal-title" id="detailTitle">Ticket #—</h3>
                <button class="modal-close" id="detailClose" type="button"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body">
                <div class="detail-meta">
                    <span class="badge" id="detailStatus">—</span>
                    <span class="badge" id="detailCat">—</span>
                    <span class="detail-date" id="detailDate">—</span>
                </div>
                <div class="detail-section">
                    <div class="detail-label">Your message</div>
                    <div class="detail-body" id="detailBody"></div>
                </div>
                <div class="detail-section" id="replySection" hidden>
                    <div class="detail-label">Admin reply</div>
                    <div class="detail-body detail-body--reply" id="detailReply"></div>
                    <div class="detail-date" id="replyDate" style="margin-top:6px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="/auth/sessionGuard.js" defer></script>
    <script src="/shared/my_tickets.js" defer></script>

    <script>
        /* ── VH Shared Topbar (Tickets — role-aware) ── */
        (function () {
            const API = "/api";
            async function initVhTopbar() {
                let user = null;
                try {
                    const res = await fetch(API + "/auth/me", { credentials: "include" });
                    if (res.ok) { const d = await res.json(); user = d?.user || null; }
                } catch { }

                const name = [user?.first_name, user?.last_name].filter(Boolean).join(" ") || user?.email || "User";
                const init = (name[0] || "U").toUpperCase();
                const avatarEl = document.getElementById("vhAvatarEl");
                const ddAvatar = document.getElementById("vhDdAvatar");
                if (avatarEl) avatarEl.textContent = init;
                if (ddAvatar) ddAvatar.textContent = init;
                const nameEl = document.getElementById("vhDdName");
                const emailEl = document.getElementById("vhDdEmail");
                if (nameEl) nameEl.textContent = name;
                if (emailEl) emailEl.textContent = user?.email || "";

                if (user?.avatar_url) {
                    [avatarEl, ddAvatar].forEach(el => {
                        if (!el) return;
                        el.textContent = "";
                        let img = el.querySelector("img");
                        if (!img) { img = document.createElement("img"); img.alt = "Avatar"; el.appendChild(img); }
                        img.src = user.avatar_url;
                    });
                }

                // Role-aware dashboard link
                const role = user?.role || "RESIDENT";
                const dashUrl = role === "OWNER"
                    ? "/Property-Owner/dashboard/property-owner-dashboard.html"
                    : "/Resident/resident_home.html";

                const brandLink = document.getElementById("brandLink");
                if (brandLink) brandLink.href = dashUrl;

                const dashBtn = document.getElementById("vhDashLink");
                if (dashBtn) dashBtn.addEventListener("click", () => location.href = dashUrl);

                const profileBtn = document.getElementById("vhProfileLink");
                if (profileBtn) profileBtn.addEventListener("click", () => location.href = "/auth/account-settings.html");

                if (window.lucide?.createIcons) lucide.createIcons();

                const btn = document.getElementById("vhProfileBtn");
                const menu = document.getElementById("vhDropdown");
                btn?.addEventListener("click", (e) => {
                    e.stopPropagation();
                    menu?.classList.toggle("open");
                    btn.setAttribute("aria-expanded", menu?.classList.contains("open"));
                });
                document.addEventListener("click", () => menu?.classList.remove("open"));
                menu?.addEventListener("click", e => e.stopPropagation());

                document.getElementById("vhLogout")?.addEventListener("click", async () => {
                    try { await fetch(API + "/auth/logout", { method: "POST", credentials: "include" }); } catch { }
                    try { window.AuthGuard?.clearSession?.(); } catch { }
                    localStorage.removeItem("vista_session_user");
                    sessionStorage.setItem("loadingDest", "/auth/login.html");
                    sessionStorage.setItem("loadingMsg", "Logging you out…");
                    window.location.href = "/auth/loading.html";
                });
            }
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", initVhTopbar);
            } else {
                initVhTopbar();
            }
        })();
    </script>
</body>

</html>
