<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VISTA-HR | Saved Listings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="/auth/toast.js"></script>
    <link rel="stylesheet" href="/Resident/saved_listings.css" />
</head>

<body>
    <!-- ══ TOPBAR ══ -->
    <header class="vh-topbar">
        <div class="vh-topbar-inner">
            <a class="vh-brand" href="/Resident/resident_home.html">
                <span class="vh-brand-mark"></span>
                <span>VISTA<b>-HR</b></span>
            </a>
            <div class="vh-topbar-right">
                <div class="vh-profile-wrap" id="vhProfileWrap">
                    <button class="vh-user-btn" id="vhProfileBtn" aria-haspopup="true" aria-expanded="false">
                        <span class="vh-avatar" id="vhAvatarEl"></span>
                    </button>
                    <div class="vh-dropdown" id="vhDropdown" aria-hidden="true">
                        <div class="vh-dd-user">
                            <div class="vh-dd-avatar" id="vhDdAvatar"></div>
                            <div class="vh-dd-info">
                                <div class="vh-dd-name" id="vhDdName">Resident</div>
                                <div class="vh-dd-email" id="vhDdEmail"></div>
                            </div>
                        </div>
                        <div class="vh-dd-sep"></div>
                        <button class="vh-dd-item" onclick="location.href='/Resident/my-bookings.html'"><i
                                data-lucide="calendar-check"></i>My bookings</button>
                        <button class="vh-dd-item" onclick="location.href='/Resident/resident_messages.html'"><i
                                data-lucide="message-square"></i>Messages</button>
                        <button class="vh-dd-item" onclick="location.href='/Resident/saved_listings.html'"><i
                                data-lucide="heart"></i>Saved listings</button>
                        <button class="vh-dd-item" onclick="location.href='../shared/my_tickets.html'"><i
                                data-lucide="ticket"></i>My tickets</button>
                        <button class="vh-dd-item" onclick="location.href='/auth/account-settings.html'"><i
                                data-lucide="user"></i>Profile</button>
                        <div class="vh-dd-sep"></div>
                        <button class="vh-dd-item vh-dd-logout" id="vhLogout"><i data-lucide="log-out"></i>Log
                            out</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="main">
        <div class="page-header">
            <h1 class="page-title">Wishlists</h1>
            <p class="page-sub" id="pageSub"></p>
        </div>

        <!-- Album grid — each album is a 2x2 photo mosaic -->
        <div class="album-grid" id="albumGrid">
            <!-- Skeleton loaders -->
            <div class="album-skeleton">
                <div class="album-mosaic-skel">
                    <div class="skel-img"></div>
                    <div class="skel-img"></div>
                    <div class="skel-img"></div>
                    <div class="skel-img"></div>
                </div>
                <div class="skel-text"></div>
                <div class="skel-text short"></div>
            </div>
            <div class="album-skeleton">
                <div class="album-mosaic-skel">
                    <div class="skel-img"></div>
                    <div class="skel-img"></div>
                    <div class="skel-img"></div>
                    <div class="skel-img"></div>
                </div>
                <div class="skel-text"></div>
                <div class="skel-text short"></div>
            </div>
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState" hidden>
            <div class="empty-icon"><i data-lucide="heart"></i></div>
            <h2 class="empty-title">No saved listings yet</h2>
            <p class="empty-sub">Tap the heart on any listing to save it here.</p>
            <a href="/Resident/resident_home.html" class="empty-cta">
                <i data-lucide="search"></i> Start exploring
            </a>
        </div>

        <!-- Expanded view (shows when album is clicked) -->
        <div class="listings-view" id="listingsView" hidden>
            <button class="back-to-albums" id="backToAlbums" type="button">
                <i data-lucide="arrow-left"></i> All wishlists
            </button>
            <h2 class="listings-title" id="listingsTitle">Saved listings</h2>
            <div class="listings-grid" id="listingsGrid"></div>
        </div>
    </main>

    <script src="/auth/sessionGuard.js" defer></script>
    <script src="/Resident/saved_listings.js" defer></script>
    <script>
        /* ── VH Shared Topbar ── */
        (function () {
            const API = "/api";
            async function initVhTopbar() {
                let user = null;
                try {
                    const res = await fetch(API + "/auth/me", { credentials: "include" });
                    if (res.ok) { const d = await res.json(); user = d?.user || null; }
                } catch { }
                const name = [user?.first_name, user?.last_name].filter(Boolean).join(" ") || user?.email || "Resident";
                const init = (name[0] || "R").toUpperCase();
                const avatarEl = document.getElementById("vhAvatarEl");
                const ddAvatar = document.getElementById("vhDdAvatar");
                if (avatarEl) avatarEl.textContent = init;
                if (ddAvatar) ddAvatar.textContent = init;
                const nameEl = document.getElementById("vhDdName");
                const emailEl = document.getElementById("vhDdEmail");
                if (nameEl) nameEl.textContent = name;
                if (emailEl) emailEl.textContent = user?.email || "";
                if (user?.avatar_url) {
                    [avatarEl, ddAvatar].forEach(el => {
                        if (!el) return;
                        el.textContent = "";
                        let img = el.querySelector("img");
                        if (!img) { img = document.createElement("img"); img.alt = "Avatar"; el.appendChild(img); }
                        img.src = user.avatar_url;
                    });
                }
                if (window.lucide?.createIcons) lucide.createIcons();
                const btn = document.getElementById("vhProfileBtn");
                const menu = document.getElementById("vhDropdown");
                btn?.addEventListener("click", (e) => {
                    e.stopPropagation();
                    menu?.classList.toggle("open");
                    btn.setAttribute("aria-expanded", menu?.classList.contains("open"));
                });
                document.addEventListener("click", () => menu?.classList.remove("open"));
                menu?.addEventListener("click", e => e.stopPropagation());
                document.getElementById("vhLogout")?.addEventListener("click", async () => {
                    try { await fetch(API + "/auth/logout", { method: "POST", credentials: "include" }); } catch { }
                    try { window.AuthGuard?.clearSession?.(); } catch { }
                    localStorage.removeItem("vista_session_user");
                    sessionStorage.setItem("loadingDest", "/auth/login.html");
                    sessionStorage.setItem("loadingMsg", "Logging you out…");
                    window.location.href = "/auth/loading.html";
                });
            }
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", initVhTopbar);
            } else {
                initVhTopbar();
            }
        })();
    </script>
</body>

</html>
