<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>VISTA-HR · Messages</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800&display=swap"
        rel="stylesheet">
    <script src="/auth/toast.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="/Resident/resident_messages.css" />
</head>

<body>

    <!-- ══ TOPBAR ══ -->
    <header class="vh-topbar">
        <div class="vh-topbar-inner">
            <a class="vh-brand" href="/Resident/resident_home.html">
                <span class="vh-brand-mark"></span>
                <span>VISTA<b>-HR</b></span>
            </a>
            <div class="vh-topbar-right">
                <div class="vh-profile-wrap" id="vhProfileWrap">
                    <button class="vh-user-btn" id="vhProfileBtn" aria-haspopup="true" aria-expanded="false">
                        <span class="vh-avatar" id="vhAvatarEl"></span>
                    </button>
                    <div class="vh-dropdown" id="vhDropdown" aria-hidden="true">
                        <div class="vh-dd-user">
                            <div class="vh-dd-avatar" id="vhDdAvatar"></div>
                            <div class="vh-dd-info">
                                <div class="vh-dd-name" id="vhDdName">Resident</div>
                                <div class="vh-dd-email" id="vhDdEmail"></div>
                            </div>
                        </div>
                        <div class="vh-dd-sep"></div>
                        <button class="vh-dd-item" onclick="location.href='/Resident/my-bookings.html'"><i
                                data-lucide="calendar-check"></i>My bookings</button>
                        <button class="vh-dd-item" onclick="location.href='/Resident/resident_messages.html'"><i
                                data-lucide="message-square"></i>Messages</button>
                        <button class="vh-dd-item" onclick="location.href='/Resident/saved_listings.html'"><i
                                data-lucide="heart"></i>Saved listings</button>
                        <button class="vh-dd-item" onclick="location.href='../shared/my_tickets.html'"><i
                                data-lucide="ticket"></i>My tickets</button>
                        <button class="vh-dd-item" onclick="location.href='/auth/account-settings.html'"><i
                                data-lucide="user"></i>Profile</button>
                        <div class="vh-dd-sep"></div>
                        <button class="vh-dd-item vh-dd-logout" id="vhLogout"><i data-lucide="log-out"></i>Log
                            out</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- MAIN LAYOUT -->
    <div class="rm-shell">

        <!-- LEFT: Thread list -->
        <aside class="rm-sidebar" id="rmSidebar">
            <div class="rm-sidebar-head">
                <h1 class="rm-sidebar-title">Messages</h1>
                <span class="rm-unread-pill" id="rmUnreadPill" hidden>0</span>
            </div>
            <div class="rm-tab-bar">
                <button class="rm-tab active" id="rmInboxTab" type="button">Inbox</button>
                <button class="rm-tab" id="rmArchiveTab" type="button">
                    <i data-lucide="archive" style="width:13px;height:13px;"></i> Archived
                </button>
            </div>
            <div class="rm-search-wrap">
                <i data-lucide="search" class="rm-search-icon"></i>
                <input class="rm-search-input" id="rmSearchInput" type="text" placeholder="Search conversations…"
                    autocomplete="off">
            </div>
            <div class="rm-thread-list" id="rmThreadList">
                <div class="rm-loading"><i data-lucide="loader-2" class="rm-spin"></i>Loading…</div>
            </div>
        </aside>

        <!-- CENTER: Chat area -->
        <main class="rm-main" id="rmMain">

            <!-- Empty state -->
            <div class="rm-empty" id="rmEmpty">
                <i data-lucide="message-square" class="rm-empty-icon"></i>
                <p class="rm-empty-title">Your messages</p>
                <p class="rm-empty-sub">When you inquire about a listing, your conversation with the owner will appear
                    here.</p>
                <a class="rm-empty-cta" href="/Resident/resident_home.html">
                    <i data-lucide="search"></i> Browse listings
                </a>
            </div>

            <!-- Chat wrap (hidden until thread selected) -->
            <div class="rm-chat" id="rmChat" hidden>

                <!-- Chat header -->
                <div class="rm-chat-header" id="rmChatHeader">
                    <button class="rm-chat-back" id="rmChatBack">
                        <i data-lucide="arrow-left"></i>
                    </button>
                    <div class="rm-chat-header-av" id="rmChatAv">P</div>
                    <div class="rm-chat-header-info">
                        <div class="rm-chat-header-name" id="rmChatName">Owner</div>
                        <div class="rm-chat-header-sub" id="rmChatSub">Property Owner</div>
                    </div>
                    <div class="rm-listing-chip" id="rmListingChip">
                        <i data-lucide="home"></i>
                        <span id="rmListingChipTitle">—</span>
                    </div>
                </div>

                <!-- Listing info bar -->
                <div class="rm-listing-bar" id="rmListingBar">
                    <img class="rm-listing-thumb" id="rmListingThumb" src="" alt="" hidden>
                    <div class="rm-listing-bar-ph" id="rmListingPh" hidden>
                        <i data-lucide="home"></i>
                    </div>
                    <div class="rm-listing-bar-info">
                        <div class="rm-listing-bar-title" id="rmListingBarTitle">—</div>
                        <div class="rm-listing-bar-meta" id="rmListingBarMeta"></div>
                    </div>
                    <a class="rm-listing-bar-link" id="rmListingBarLink" href="#">
                        <i data-lucide="external-link"></i> View
                    </a>
                </div>

                <!-- Bubble list -->
                <div class="rm-bubbles" id="rmBubbles"></div>

                <!-- Typing indicator -->
                <div id="rmTypingIndicator" hidden>
                    <div class="rm-typing-bubble">
                        <span class="rm-typing-dot"></span>
                        <span class="rm-typing-dot"></span>
                        <span class="rm-typing-dot"></span>
                    </div>
                </div>

                <!-- Input area -->
                <div class="rm-input-area">
                    <input type="file" id="rmPhotoInput" accept="image/*" hidden>
                    <button class="rm-photo-btn" id="rmPhotoBtn" type="button" aria-label="Attach photo">
                        <i data-lucide="image" style="pointer-events:none;width:18px;height:18px;"></i>
                    </button>
                    <textarea class="rm-input" id="rmInput" placeholder="Type a message…" rows="1"
                        maxlength="2000"></textarea>
                    <button class="rm-send-btn" id="rmSendBtn" disabled>
                        <i data-lucide="send" style="pointer-events:none;"></i>
                    </button>
                </div>

            </div>
        </main>

        <!-- RIGHT: Owner + Listing info panel -->
        <div class="rm-info-panel" id="rmInfoPanel" hidden>
            <div class="rm-info-inner" id="rmInfoInner"></div>
        </div>

    </div>

    <!-- Delete conversation confirm modal -->
    <div class="rm-modal-overlay" id="rmDeleteOverlay" hidden>
        <div class="rm-modal-card">
            <div class="rm-modal-icon">
                <i data-lucide="trash-2"></i>
            </div>
            <div class="rm-modal-title">Delete conversation?</div>
            <div class="rm-modal-sub">This will remove the conversation from your inbox. The other person won't be
                affected.</div>
            <div class="rm-modal-actions">
                <button class="rm-modal-btn rm-modal-ghost" id="rmDeleteCancel" type="button">Cancel</button>
                <button class="rm-modal-btn rm-modal-danger" id="rmDeleteConfirm" type="button">Delete</button>
            </div>
        </div>
    </div>

    <script src="/auth/user-avatar.js"></script>
    <script src="/auth/sessionGuard.js"></script>
    <script src="/Resident/resident_messages.js"></script>
    <script>
        /* ── VH Shared Topbar ── */
        (function () {
            const API = "/api";
            async function initVhTopbar() {
                let user = null;
                try {
                    const res = await fetch(API + "/auth/me", { credentials: "include" });
                    if (res.ok) { const d = await res.json(); user = d?.user || null; }
                } catch { }
                const name = [user?.first_name, user?.last_name].filter(Boolean).join(" ") || user?.email || "Resident";
                const init = (name[0] || "R").toUpperCase();
                const avatarEl = document.getElementById("vhAvatarEl");
                const ddAvatar = document.getElementById("vhDdAvatar");
                if (avatarEl) avatarEl.textContent = init;
                if (ddAvatar) ddAvatar.textContent = init;
                const nameEl = document.getElementById("vhDdName");
                const emailEl = document.getElementById("vhDdEmail");
                if (nameEl) nameEl.textContent = name;
                if (emailEl) emailEl.textContent = user?.email || "";
                if (user?.avatar_url) {
                    [avatarEl, ddAvatar].forEach(el => {
                        if (!el) return;
                        el.textContent = "";
                        let img = el.querySelector("img");
                        if (!img) { img = document.createElement("img"); img.alt = "Avatar"; el.appendChild(img); }
                        img.src = user.avatar_url;
                    });
                }
                if (window.lucide?.createIcons) lucide.createIcons();
                const btn = document.getElementById("vhProfileBtn");
                const menu = document.getElementById("vhDropdown");
                btn?.addEventListener("click", (e) => {
                    e.stopPropagation();
                    menu?.classList.toggle("open");
                    btn.setAttribute("aria-expanded", menu?.classList.contains("open"));
                });
                document.addEventListener("click", () => menu?.classList.remove("open"));
                menu?.addEventListener("click", e => e.stopPropagation());
                document.getElementById("vhLogout")?.addEventListener("click", async () => {
                    try { await fetch(API + "/auth/logout", { method: "POST", credentials: "include" }); } catch { }
                    try { window.AuthGuard?.clearSession?.(); } catch { }
                    localStorage.removeItem("vista_session_user");
                    sessionStorage.setItem("loadingDest", "/auth/login.html");
                    sessionStorage.setItem("loadingMsg", "Logging you out…");
                    window.location.href = "/auth/loading.html";
                });
            }
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", initVhTopbar);
            } else {
                initVhTopbar();
            }
        })();
    </script>
</body>

</html>
