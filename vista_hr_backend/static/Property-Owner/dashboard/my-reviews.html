<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VISTA-HR | My Reviews</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700;9..40,800;9..40,900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'DM Sans', sans-serif;
            background: #f7f4ee;
            min-height: 100vh;
            color: #111;
        }

        .mr-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: #fff;
            border-bottom: 1px solid rgba(0, 0, 0, 0.06);
        }

        .mr-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: inherit;
        }

        .mr-brand-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
            background: #030303;
        }

        .mr-brand-text {
            font-weight: 800;
            font-size: 15px;
            letter-spacing: 0.2px;
        }

        .mr-back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            background: #fff;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            color: #374151;
            cursor: pointer;
            text-decoration: none;
            font-family: inherit;
        }

        .mr-back-btn:hover {
            background: #f9fafb;
        }

        .mr-back-btn i {
            width: 14px;
            height: 14px;
        }

        .mr-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .mr-header {
            margin-bottom: 24px;
        }

        .mr-title {
            font-size: 28px;
            font-weight: 800;
            margin: 0 0 6px;
            letter-spacing: -0.3px;
        }

        .mr-subtitle {
            font-size: 14px;
            color: #6b7280;
            margin: 0;
        }

        /* Stats */
        .mr-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .mr-stat {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.06);
            border-radius: 14px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.03);
        }

        .mr-stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .mr-stat-icon--amber {
            background: #fef3c7;
            color: #b45309;
        }

        .mr-stat-icon--blue {
            background: #dbeafe;
            color: #1e40af;
        }

        .mr-stat-icon--green {
            background: #dcfce7;
            color: #15803d;
        }

        .mr-stat-icon i {
            width: 18px;
            height: 18px;
        }

        .mr-stat-body {
            min-width: 0;
        }

        .mr-stat-label {
            font-size: 11px;
            font-weight: 700;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .mr-stat-value {
            font-size: 24px;
            font-weight: 800;
            color: #111;
            line-height: 1.1;
            margin-top: 2px;
        }

        /* Filter */
        .mr-filters {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        .mr-filters select {
            padding: 9px 14px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            background: #fff;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            cursor: pointer;
            font-family: inherit;
        }

        /* Cards grid */
        .mr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 16px;
        }

        .mr-card {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.07);
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 180px;
        }

        .mr-card-top {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .mr-av {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1B3F6E, #C8872A);
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .mr-av img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .mr-card-info {
            flex: 1;
            min-width: 0;
        }

        .mr-card-name {
            font-size: 14px;
            font-weight: 700;
            color: #111;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .mr-card-meta {
            font-size: 11px;
            color: #6b7280;
            margin-top: 2px;
        }

        .mr-stars {
            display: flex;
            gap: 2px;
        }

        .mr-stars i {
            width: 14px;
            height: 14px;
        }

        .mr-stars .filled {
            color: #f59e0b;
            fill: #f59e0b;
        }

        .mr-stars .empty {
            color: #e5e7eb;
        }

        .mr-comment {
            font-size: 13px;
            color: #374151;
            line-height: 1.55;
            margin: 0;
            flex: 1;
            font-style: italic;
        }

        .mr-footer {
            font-size: 11px;
            color: #9ca3af;
            border-top: 1px solid #f3f4f6;
            padding-top: 8px;
        }

        .mr-empty {
            padding: 40px 20px;
            text-align: center;
            background: #fff;
            border: 1px dashed rgba(0, 0, 0, 0.1);
            border-radius: 14px;
            color: #6b7280;
            grid-column: 1 / -1;
        }

        .mr-empty i {
            width: 36px;
            height: 36px;
            color: #d1d5db;
            margin-bottom: 10px;
        }

        /* Pager */
        .mr-pager {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .mr-pager-info {
            font-size: 12px;
            color: #6b7280;
        }

        .mr-pager-btns {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .mr-pg-btn {
            min-width: 36px;
            height: 36px;
            padding: 0 10px;
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            background: #fff;
            color: #374151;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 150ms;
            font-family: inherit;
        }

        .mr-pg-btn:hover:not(:disabled) {
            background: #f9fafb;
        }

        .mr-pg-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .mr-pg-btn.active {
            background: #1B3F6E;
            color: #fff;
            border-color: #1B3F6E;
        }

        @media (max-width: 600px) {
            .mr-container {
                padding: 20px 16px;
            }

            .mr-title {
                font-size: 22px;
            }
        }
    </style>
</head>

<body>
    <header class="mr-topbar">
        <a href="/Property-Owner/dashboard/property-owner-dashboard.html" class="mr-brand">
            <span class="mr-brand-dot"></span>
            <span class="mr-brand-text">VISTA-HR</span>
        </a>
        <a href="/Property-Owner/dashboard/property-owner-dashboard.html" class="mr-back-btn">
            <i data-lucide="arrow-left"></i> Back to dashboard
        </a>
    </header>

    <div class="mr-container">
        <div class="mr-header">
            <h1 class="mr-title">My Reviews</h1>
            <p class="mr-subtitle">Feedback from residents who have stayed at your properties</p>
        </div>

        <!-- Stats -->
        <div class="mr-stats">
            <div class="mr-stat">
                <div class="mr-stat-icon mr-stat-icon--amber"><i data-lucide="star"></i></div>
                <div class="mr-stat-body">
                    <div class="mr-stat-label">Average rating</div>
                    <div class="mr-stat-value" id="mrAvg">—</div>
                </div>
            </div>
            <div class="mr-stat">
                <div class="mr-stat-icon mr-stat-icon--blue"><i data-lucide="message-square"></i></div>
                <div class="mr-stat-body">
                    <div class="mr-stat-label">Total reviews</div>
                    <div class="mr-stat-value" id="mrTotal">—</div>
                </div>
            </div>
            <div class="mr-stat">
                <div class="mr-stat-icon mr-stat-icon--green"><i data-lucide="thumbs-up"></i></div>
                <div class="mr-stat-body">
                    <div class="mr-stat-label">5-star reviews</div>
                    <div class="mr-stat-value" id="mrFive">—</div>
                </div>
            </div>
        </div>

        <!-- Filter -->
        <div class="mr-filters">
            <select id="mrFilterStar">
                <option value="">All ratings</option>
                <option value="5">★★★★★ 5</option>
                <option value="4">★★★★ 4</option>
                <option value="3">★★★ 3</option>
                <option value="2">★★ 2</option>
                <option value="1">★ 1</option>
            </select>
        </div>

        <!-- Reviews grid -->
        <div class="mr-grid" id="mrGrid">
            <div class="mr-empty">Loading…</div>
        </div>

        <div id="mrPager"></div>
    </div>

    <script src="/auth/sessionGuard.js"></script>
    <script src="/Property-Owner/dashboard/my-reviews.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
