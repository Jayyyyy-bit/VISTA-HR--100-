<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VISTA-HR | Create Listing</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Instrument+Serif:ital@0;1&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script src="vendor/lucide.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="wizard.css" />
    <link rel="stylesheet" href="transition.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css" />
    <link rel="stylesheet" href="steps/step5_amenities.css" />


</head>


<body>

    <div class="bg" aria-hidden="true">
        <div class="bg-grid"></div>
        <div class="glow g1"></div>
        <div class="glow g2"></div>
    </div>

    <!--  header -->
    <header class="topbar">
        <div class="brand">
            <span class="logo-box"></span>
            <span class="brand-text">VISTA<span>-HR</span></span>
        </div>

        <div class="top-actions">
            <button class="chip" type="button" id="questionsBtn">Questions?</button>
            <button class="chip primary" type="button" id="saveExitBtn">Save & exit</button>
        </div>
    </header>

    <!-- Only center content swaps -->
    <main class="page">
        <div class="wizard-shell">
            <div class="stage stage-centered">

                <section class="panel panel-main" id="stepHost" data-transition-key="main">
                    <!-- injected sa mga steps-->
                </section>

                <aside class="panel-side" data-transition-key="side">
                    <div class="side-stack">

                        <section class="mini-card">
                            <div class="mini-head">
                                <div class="mini-title"><i data-lucide="sparkles"></i> Quick tips</div>
                                <div class="mini-pill" id="selectedPill">Selected: —</div>
                            </div>
                            <ul class="tips" id="guideTips">
                                <li>Pick the closest match for faster approval.</li>
                                <li>Keep details consistent with your photos.</li>
                                <li>You can edit this later anytime.</li>
                            </ul>
                        </section>

                        <section class="mini-card">
                            <div class="mini-head">
                                <div class="mini-title"><i data-lucide="check-circle-2"></i> Draft readiness</div>
                                <div class="mini-pill"><span id="percentLabel">0%</span></div>
                            </div>

                            <div class="progress-track">
                                <div class="bar" id="progressBar"></div>
                            </div>

                            <div class="checklist" id="sideChecklist"></div>

                            <div class="side-note">
                                Publishing stays <b>locked</b> until verification (later).
                            </div>
                        </section>

                    </div>
                </aside>

            </div>
        </div>
    </main>

    <!-- ── Bottom tips strip ── -->
    <div class="bts" id="bottomTipsStrip">
        <div class="bts-inner">
            <span class="bts-icon">
                <i data-lucide="lightbulb"></i>
            </span>
            <div class="bts-list">
                <!-- populated by SidePanel.setTips() -->
            </div>
            <button class="bts-close" id="btsDismiss" aria-label="Dismiss tips">
                <i data-lucide="x"></i>
            </button>
        </div>
    </div>

    <!-- footer -->
    <footer class="bottombar">
        <div class="progress-bottom" id="dots"></div>
        <div class="nav">
            <button class="btn ghost" id="backBtn" type="button">Back</button>
            <button class="btn solid" id="nextBtn" type="button" disabled>Next</button>
        </div>
    </footer>

    <!-- Overlay (transition) to -->


    <!-- Core scripts naka in order para di magulo -->
    <script src="core/dom.js"></script>
    <script src="core/store.js"></script>
    <script src="core/sidepanel.js"></script>
    <script src="core/transition.js"></script>

    <script src="steps/step1_unit_category.js"></script>
    <script src="steps/step2_space_type.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="steps/step3_location.js?v=2"></script>
    <script src="steps/step4_capacity.js"></script>
    <script src="steps/step5_amenities.js"></script>
    <script src="steps/step6_highlights.js"></script>
    <script src="steps/step7_photos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script src="steps/step8_details.js"></script>
    <script src="steps/step9_pricing.js"></script>
    <script src="steps/step10_preview.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>

    <script src="core/bg-motion.js"></script>
    <script src="core/router.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const overlay = document.getElementById("faqOverlay");
            const body = document.getElementById("faqBody");

            const FAQS = [
                {
                    group: "Getting started", items: [
                        ["Can I save my progress and continue later?", "Yes. Use \"Save & exit\" anytime — your draft is preserved and you can resume from where you left off."],
                        ["How many steps does the wizard have?", "10 steps: category, space type, location, capacity, amenities, highlights, photos, details, pricing, and preview."],
                    ]
                },
                {
                    group: "Listing details", items: [
                        ["Can I edit my listing after publishing?", "Yes. All fields are editable from your Owner dashboard after your listing goes live."],
                        ["What property types are supported?", "Bedspace, Studio, 1BR, 2BR, Dormitory, and Apartment."],
                        ["Is a virtual tour required?", "No — optional, but recommended as it significantly increases resident interest."],
                    ]
                },
                {
                    group: "Verification & publishing", items: [
                        ["Why is the Publish button locked?", "Publishing requires KYC (identity verification) approval first. Submit via Account Settings → Verification."],
                        ["How long does KYC approval take?", "Typically 1–2 business days after submission."],
                        ["What happens after I submit my listing?", "It goes to Admin review before going live to residents."],
                    ]
                },
                {
                    group: "Photos & media", items: [
                        ["What photo format is accepted?", "JPG or PNG, max 10MB per file. A minimum of 3 photos is recommended."],
                        ["How do I add a 360° virtual tour?", "In the Photos step, toggle \"Add virtual tour\" and upload a panoramic image."],
                    ]
                },
                {
                    group: "Pricing", items: [
                        ["Can I offer a student discount?", "Yes — set a discount percentage in the Pricing step. Applies to residents with approved student verification."],
                        ["Can I change my price after publishing?", "Yes. Price updates apply to new bookings only."],
                    ]
                },
            ];

            function buildFAQ() {
                body.innerHTML = FAQS.map(({ group, items }) => `
      <p style="font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:#999;padding:16px 0 6px;margin:0;">${group}</p>
      ${items.map(([q, a]) => `
        <div class="faq-item" style="border-bottom:0.5px solid #e5e5e5;">
          <button class="faq-btn" style="width:100%;background:none;border:none;text-align:left;padding:12px 0;font-size:14px;font-weight:500;cursor:pointer;display:flex;justify-content:space-between;gap:12px;">${q}<span class="faq-icon" style="flex-shrink:0;transition:transform .2s;font-size:18px;color:#aaa;">+</span></button>
          <div class="faq-ans" style="font-size:13px;color:#666;line-height:1.65;max-height:0;overflow:hidden;transition:max-height .25s ease,padding .2s;">${a}</div>
        </div>`).join("")}
    `).join("");

                body.querySelectorAll(".faq-btn").forEach(btn => {
                    btn.addEventListener("click", () => {
                        const item = btn.closest(".faq-item");
                        const isOpen = item.dataset.open === "1";
                        body.querySelectorAll(".faq-item").forEach(el => {
                            el.dataset.open = "0";
                            el.querySelector(".faq-ans").style.maxHeight = "0";
                            el.querySelector(".faq-ans").style.paddingBottom = "0";
                            el.querySelector(".faq-icon").style.transform = "";
                        });
                        if (!isOpen) {
                            item.dataset.open = "1";
                            item.querySelector(".faq-ans").style.maxHeight = "120px";
                            item.querySelector(".faq-ans").style.paddingBottom = "12px";
                            item.querySelector(".faq-icon").style.transform = "rotate(45deg)";
                        }
                    });
                });
            }

            document.getElementById("questionsBtn").addEventListener("click", () => {
                buildFAQ();
                overlay.style.cssText = "display:flex; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.45); z-index:9999; align-items:center; justify-content:center;";
            });

            document.getElementById("faqClose").addEventListener("click", () => {
                overlay.style.cssText = "display:none;";
            });

            overlay.addEventListener("click", e => {
                if (e.target === overlay) overlay.style.cssText = "display:none;";
            });
        });
    </script>
    <script>lucide.createIcons();</script>

    <!-- FAQ Modal -->
    <div id="faqOverlay"
        style="display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.45); z-index:9999; align-items:center; justify-content:center;">
        <div <div
            style="background:#ffffff; border-radius:16px; width:min(560px, 92vw); max-height:80vh; overflow-y:auto; padding:28px 28px 20px; font-family:'Plus Jakarta Sans', sans-serif; box-shadow:0 8px 40px rgba(0,0,0,0.18);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
                <span style="font-size:16px; font-weight:600;">Frequently asked questions</span>
                <button id="faqClose"
                    style="background:none; border:none; cursor:pointer; font-size:22px; line-height:1; color:#888;">&times;</button>
            </div>
            <div id="faqBody"></div>
        </div>
    </div>

</body>

</html>
