<div class="step-header">
    <div class="step-kicker">Create listing • Step 4</div>
    <h1 class="step-title">How many guests can stay?</h1>
    <p class="step-sub">Set the maximum number of guests and sleeping arrangements.</p>
</div>

<section class="formCard capCard">


    <div id="capSuggestionBanner" class="cap-suggestion" style="display:none;">
        <div class="cap-suggestion__icon">💡</div>
        <div class="cap-suggestion__body">
            <p class="cap-suggestion__text" id="capSuggestionText"></p>
            <button type="button" class="cap-suggestion__btn" id="capSuggestionApply">Apply suggestion</button>
        </div>
        <button type="button" class="cap-suggestion__close" id="capSuggestionClose" aria-label="Dismiss">✕</button>
    </div>

    <!-- Guests -->
    <div class="cap-row">
        <div class="cap-left">
            <div class="cap-title">Guests</div>
            <div class="cap-sub">How many people can stay here?</div>
        </div>
        <div class="cap-right">
            <input type="range" id="capGuests" min="1" max="16" step="1">
            <div class="cap-value"><span id="capGuestsVal">1</span> guests</div>
        </div>
    </div>

    <!-- Bedrooms -->
    <div class="cap-row">
        <div class="cap-left">
            <div class="cap-title">Bedrooms</div>
            <div class="cap-sub">Separate sleeping rooms</div>
        </div>
        <div class="cap-stepper" data-key="bedrooms"></div>
    </div>

    <!-- Beds -->
    <div class="cap-row">
        <div class="cap-left">
            <div class="cap-title">Beds</div>
            <div class="cap-sub">Total sleeping spots</div>
        </div>
        <div class="cap-stepper" data-key="beds"></div>
    </div>

    <!-- Bathrooms -->
    <div class="cap-row">
        <div class="cap-left">
            <div class="cap-title cap-titleRow">
                <span>Bathrooms</span>

                <span class="hintIcon" tabindex="0" aria-label="Why bathrooms can be 0.5"
                    data-tip="0.5 means there's a toilet + sink, but no shower/bath.">
                    i
                </span>
            </div>

            <div class="cap-sub">Toilet + shower (½ allowed)</div>
        </div>

        <div class="cap-stepper" data-key="bathrooms" data-step="0.5"></div>
    </div>



    </div>
</section>
