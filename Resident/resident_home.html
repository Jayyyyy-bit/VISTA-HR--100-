<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Resident Home</title>
    <link rel="stylesheet" href="./resident_home.css" />
</head>

<body>
    <header class="topbar">
        <div class="brand">VISTA HR</div>

        <div class="search">
            <input id="qCity" placeholder="Search city (e.g., Makati)" />
            <input id="qBudget" placeholder="Max budget (₱)" inputmode="numeric" />
            <button id="searchBtn">Search</button>
        </div>

        <div class="right">
            <span id="who"></span>
            <button id="logoutBtn" class="ghost" type="button">Logout</button>
        </div>
    </header>

    <main class="container">
        <h2 class="title">Popular stays</h2>
        <div id="grid" class="grid"></div>
    </main>

    <script src="../auth/sessionGuard.js"></script>
    <script src="resident_home.js"></script>
</body>

</html>
